<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Debug - Direct DB Query</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      line-height: 1.6;
    }
    h1 {
      color: #00A389;
    }
    pre {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 4px;
      overflow: auto;
      max-height: 300px;
    }
    button {
      background: #00A389;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    input {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      width: 300px;
    }
    .result {
      margin-top: 20px;
    }
    .error {
      color: red;
    }
    .success {
      color: green;
    }
  </style>
  <!-- Supabase client library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Profile Debug Tool</h1>
  <p>This tool directly queries your database for a user profile, bypassing React Router entirely.</p>
  
  <div>
    <label for="profileUrl">Profile URL (username only):</label>
    <input type="text" id="profileUrl" value="francispark" placeholder="e.g. francispark">
    <button onclick="lookupProfile()">Look Up</button>
  </div>
  
  <div class="result">
    <h2>Result:</h2>
    <div id="status"></div>
    <pre id="output">Results will appear here...</pre>
  </div>
  
  <script>
    // Initialize Supabase client (with your actual credentials)
    const SUPABASE_URL = "https://nmddvthcsyppyjncqfsk.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tZGR2dGhjc3lwcHlqbmNxZnNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ0ODg4MTYsImV4cCI6MjA2MDA2NDgxNn0.NMzMDvaOD2vHfBfjRbuit05EIdi7QK9pC_ChzX3klG0";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Function to query profile by URL
    async function lookupProfile() {
      const profileUrl = document.getElementById('profileUrl').value.trim();
      const statusEl = document.getElementById('status');
      const outputEl = document.getElementById('output');
      
      if (!profileUrl) {
        statusEl.innerHTML = '<span class="error">Please enter a profile URL</span>';
        return;
      }
      
      // Show loading status
      statusEl.innerHTML = 'Loading...';
      outputEl.textContent = 'Querying database...';
      
      try {
        console.log(`Looking up profile: ${profileUrl}`);
        
        // Query the database
        const { data, error } = await supabase
          .from('users')
          .select('*')
          .eq('profile_url', profileUrl)
          .single();
          
        if (error) {
          console.error('Error:', error);
          statusEl.innerHTML = `<span class="error">Error: ${error.message}</span>`;
          outputEl.textContent = JSON.stringify(error, null, 2);
          return;
        }
        
        if (!data) {
          statusEl.innerHTML = `<span class="error">No user found with profile_url "${profileUrl}"</span>`;
          outputEl.textContent = 'No data returned';
          return;
        }
        
        // Success!
        statusEl.innerHTML = `<span class="success">Found user: ${data.first_name || data.profile_url}</span>`;
        outputEl.textContent = JSON.stringify(data, null, 2);
        
        // Generate direct link to the profile
        const directUrl = `http://localhost:8080/@${profileUrl}`;
        statusEl.innerHTML += `<p>Direct link: <a href="${directUrl}" target="_blank">${directUrl}</a></p>`;
        
      } catch (err) {
        console.error('Exception:', err);
        statusEl.innerHTML = `<span class="error">Exception: ${err.message}</span>`;
        outputEl.textContent = err.stack || err.toString();
      }
    }
    
    // Debug check - verify Supabase is available
    console.log('Supabase available:', !!supabase);
    
    // Run when page loads
    document.addEventListener('DOMContentLoaded', () => {
      // Auto-load a profile if URL has a profileUrl parameter 
      const urlParams = new URLSearchParams(window.location.search);
      const autoProfile = urlParams.get('profileUrl');
      if (autoProfile) {
        document.getElementById('profileUrl').value = autoProfile;
        lookupProfile();
      }
    });
  </script>
</body>
</html>
