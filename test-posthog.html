<!DOCTYPE html>
<html>
<head>
    <title>PostHog Test</title>
</head>
<body>
    <h1>PostHog Integration Test</h1>
    <div id="status">Testing...</div>
    
    <script>
        // Test PostHog integration
        console.log('Testing PostHog integration...');
        
        // Check if environment variables are available
        console.log('VITE_POSTHOG_KEY:', import.meta.env?.VITE_POSTHOG_KEY ? 'Set' : 'Not set');
        console.log('VITE_POSTHOG_HOST:', import.meta.env?.VITE_POSTHOG_HOST || 'Not set');
        
        // Test PostHog loading
        setTimeout(() => {
            const status = document.getElementById('status');
            if (window.posthog) {
                status.innerHTML = '✅ PostHog loaded successfully!';
                status.style.color = 'green';
                
                // Send a test event
                window.posthog.capture('test_event', {
                    source: 'manual_test',
                    timestamp: new Date().toISOString()
                });
                console.log('✅ Test event sent to PostHog');
            } else {
                status.innerHTML = '❌ PostHog not loaded';
                status.style.color = 'red';
                console.error('❌ PostHog not found on window object');
            }
        }, 2000);
    </script>
</body>
</html>
