[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = """
      default-src 'self'; \
      script-src 'self' https://nmddvthcsyppyjncqfsk.supabase.co; \
      style-src 'self' 'unsafe-inline'; \
      img-src 'self' data: blob: https://nmddvthcsyppyjncqfsk.supabase.co https://img.youtube.com https://i.ytimg.com https://i.vimeocdn.com https://giphy.com https://media.giphy.com https://i.imgur.com https://lovable.dev; \
      media-src 'self' https://nmddvthcsyppyjncqfsk.supabase.co; \
      connect-src 'self' https://nmddvthcsyppyjncqfsk.supabase.co https://api.giphy.com; \
      frame-src 'self' https://www.youtube.com https://youtube.com https://player.vimeo.com; \
      font-src 'self' data:; \
      object-src 'none'; \
      base-uri 'self'; \
      form-action 'self'; \
      manifest-src 'self'; \
      report-uri https://nmddvthcsyppyjncqfsk.supabase.co/functions/v1/csp-report""" 