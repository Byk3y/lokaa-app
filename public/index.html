<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Lokaa Connect</title>
    <meta name="description" content="Connect with your community on Lokaa" />
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Lokaa" />
    
    <!-- Page Lifecycle API & bfcache Optimization -->
    <script>
      (function() {
        'use strict';
        
        console.log('🚀 [bfcache] Initializing Page Lifecycle API for mobile optimization...');
        
        // Page Lifecycle API implementation for bfcache optimization
        window.PageLifecycle = {
          init() {
            // Track page visibility changes
            document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                console.log('📱 [PageLifecycle] Page hidden');
            } else {
                console.log('📱 [PageLifecycle] Page visible');
            }
            });
            
            // Track page show/hide for bfcache detection
            window.addEventListener('pageshow', (event) => {
              if (event.persisted) {
                console.log('🎉 [bfcache] Page restored from bfcache');
              }
            });
            
            console.log('✅ [PageLifecycle] bfcache optimization active');
          }
        };
        
        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', () => window.PageLifecycle.init());
        } else {
          window.PageLifecycle.init();
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- PWA Service Worker will be auto-registered by vite-plugin-pwa -->
    
    <!-- Sign Out Fix Test Script -->
    <script src="/test-signout-fix.js"></script>
    
    <!-- Main Application -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
