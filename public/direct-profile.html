<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direct Profile Access</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      line-height: 1.6;
    }
    h1 {
      color: #00A389;
    }
    pre {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 4px;
      overflow: auto;
      max-height: 300px;
    }
    button {
      background: #00A389;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    input {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      width: 300px;
    }
    .result {
      margin-top: 20px;
    }
    .error {
      color: red;
    }
    .success {
      color: green;
    }
    .profile-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
    }
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background-color: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 30px;
      color: white;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    .center {
      text-align: center;
    }
  </style>
  <!-- Supabase client library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Direct Profile Access</h1>
  <p>This tool directly queries the database for a user profile without going through React Router, helping diagnose redirect issues.</p>
  
  <div>
    <label for="profileUrl">Profile URL (username only):</label>
    <input type="text" id="profileUrl" placeholder="e.g. francispark">
    <button onclick="lookupProfile()">Look Up</button>
  </div>
  
  <div class="result">
    <h2>Result:</h2>
    <div id="status"></div>
    <pre id="output">Results will appear here...</pre>
  </div>

  <div id="profileCard" class="profile-card" style="display: none">
    <div class="center">
      <div class="avatar" id="avatar">U</div>
      <h2 id="profileName">User Name</h2>
      <p id="profileRole">Member</p>
      <p id="profileBio">No biography available</p>
    </div>
  </div>
  
  <script>
    // Initialize Supabase client
    const SUPABASE_URL = "https://nmddvthcsyppyjncqfsk.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tZGR2dGhjc3lwcHlqbmNxZnNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ0ODg4MTYsImV4cCI6MjA2MDA2NDgxNn0.NMzMDvaOD2vHfBfjRbuit05EIdi7QK9pC_ChzX3klG0";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Load profile from URL if present
    document.addEventListener('DOMContentLoaded', () => {
      // Check URL parameters
      const urlParams = new URLSearchParams(window.location.search);
      const profileParam = urlParams.get('profile');
      
      if (profileParam) {
        document.getElementById('profileUrl').value = profileParam;
        lookupProfile();
      }
    });
    
    // Function to query profile
    async function lookupProfile() {
      const profileUrl = document.getElementById('profileUrl').value.trim();
      const statusEl = document.getElementById('status');
      const outputEl = document.getElementById('output');
      const profileCard = document.getElementById('profileCard');
      
      if (!profileUrl) {
        statusEl.innerHTML = '<span class="error">Please enter a profile URL</span>';
        return;
      }
      
      // Show loading status
      statusEl.innerHTML = 'Loading...';
      outputEl.textContent = 'Querying database...';
      profileCard.style.display = 'none';
      
      try {
        console.log(`Looking up profile: ${profileUrl}`);
        
        // Try multiple formats
        const cleanSlug = profileUrl.replace(/^@/, '');
        
        // First try exact match
        let { data, error } = await supabase
          .from('users')
          .select('*')
          .eq('profile_url', cleanSlug)
          .single();
          
        // If not found, try with @ prefix
        if (!data && error) {
          console.log('Not found with clean slug, trying with @ prefix');
          const result = await supabase
            .from('users')
            .select('*')
            .eq('profile_url', `@${cleanSlug}`)
            .single();
            
          if (result.data) {
            data = result.data;
            error = null;
          }
        }
        
        // Final attempt - search more broadly
        if (!data && error) {
          console.log('Not found with either format, trying broader search');
          const result = await supabase
            .from('users')
            .select('*')
            .or(`profile_url.eq.${cleanSlug},profile_url.eq.@${cleanSlug}`)
            .limit(1);
            
          if (result.data?.length > 0) {
            data = result.data[0];
            error = null;
          }
        }
        
        if (error || !data) {
          statusEl.innerHTML = `<span class="error">User not found: ${error?.message || 'No match in database'}</span>`;
          outputEl.textContent = JSON.stringify(error || { message: 'No user found' }, null, 2);
          return;
        }
        
        // Success!
        statusEl.innerHTML = `<span class="success">Found user: ${data.first_name || data.profile_url}</span>`;
        outputEl.textContent = JSON.stringify(data, null, 2);
        
        // Update profile card
        document.getElementById('profileName').textContent = 
          `${data.first_name || ''} ${data.last_name || ''}`.trim() || data.profile_url;
        document.getElementById('profileRole').textContent = data.role || 'Member';
        document.getElementById('profileBio').textContent = data.bio || 'No biography provided';
        
        // Avatar
        const avatarEl = document.getElementById('avatar');
        if (data.avatar_url) {
          avatarEl.innerHTML = `<img src="${data.avatar_url}" alt="Profile">`;
        } else {
          // Get initials
          const initials = (data.first_name?.charAt(0) || data.profile_url?.charAt(0) || 'U').toUpperCase();
          avatarEl.textContent = initials;
        }
        
        // Show profile card
        profileCard.style.display = 'block';
        
        // Generate link to main app
        const regularUrl = `http://localhost:8082/@${data.profile_url.replace(/^@/, '')}`;
        statusEl.innerHTML += `<p>App URL: <a href="${regularUrl}" target="_blank">${regularUrl}</a></p>`;
        
      } catch (err) {
        console.error('Exception:', err);
        statusEl.innerHTML = `<span class="error">Exception: ${err.message}</span>`;
        outputEl.textContent = err.stack || err.toString();
      }
    }
  </script>
</body>
</html>
