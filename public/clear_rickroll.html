<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear Rick Astley Videos</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      line-height: 1.6;
    }
    h1 {
      color: #d32f2f;
    }
    button {
      background-color: #d32f2f;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 16px;
    }
    button:hover {
      background-color: #b71c1c;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background-color: #f9f9f9;
      min-height: 50px;
    }
    .media-preview {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .media-item {
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 4px;
      width: 100%;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>Rick Astley Video Removal Tool</h1>
  <p>This tool will help you remove any Rick Astley videos that might be in your space media gallery.</p>
  
  <button id="checkStorage">Check Local Storage for Space Media</button>
  <button id="clearRickRoll">Remove Rick Astley Videos</button>
  
  <div id="result">Results will appear here...</div>
  <div id="mediaPreview" class="media-preview"></div>
  
  <script>
    document.getElementById('checkStorage').addEventListener('click', function() {
      const mediaKeys = Object.keys(localStorage).filter(key => key.includes('space_media'));
      const resultDiv = document.getElementById('result');
      const previewDiv = document.getElementById('mediaPreview');
      
      resultDiv.innerHTML = '';
      previewDiv.innerHTML = '';
      
      if (mediaKeys.length === 0) {
        resultDiv.innerHTML = 'No space media found in local storage.';
        return;
      }
      
      resultDiv.innerHTML = `Found ${mediaKeys.length} space media entries in local storage:<br>`;
      
      mediaKeys.forEach(key => {
        try {
          const mediaData = JSON.parse(localStorage.getItem(key));
          resultDiv.innerHTML += `<br>${key}: ${mediaData.length} items`;
          
          // Create preview
          const mediaContainer = document.createElement('div');
          mediaContainer.className = 'media-item';
          mediaContainer.innerHTML = `<h3>${key}</h3>`;
          
          mediaData.forEach((item, index) => {
            const itemDetails = document.createElement('div');
            itemDetails.innerHTML = `
              <p>Item ${index + 1}: ${item.type} - ${item.url.substring(0, 50)}...</p>
              ${item.type === 'video' ? 
                `<iframe width="280" height="157" src="${item.url}" frameborder="0" allowfullscreen></iframe>` : 
                `<img src="${item.url}" width="280" />`
              }
            `;
            mediaContainer.appendChild(itemDetails);
          });
          
          previewDiv.appendChild(mediaContainer);
        } catch (e) {
          resultDiv.innerHTML += `<br>${key}: Error parsing data - ${e.message}`;
        }
      });
    });
    
    document.getElementById('clearRickRoll').addEventListener('click', function() {
      const mediaKeys = Object.keys(localStorage).filter(key => key.includes('space_media'));
      const resultDiv = document.getElementById('result');
      const previewDiv = document.getElementById('mediaPreview');
      let removedCount = 0;
      
      resultDiv.innerHTML = '';
      previewDiv.innerHTML = '';
      
      if (mediaKeys.length === 0) {
        resultDiv.innerHTML = 'No space media found in local storage.';
        return;
      }
      
      mediaKeys.forEach(key => {
        try {
          const mediaData = JSON.parse(localStorage.getItem(key));
          const originalLength = mediaData.length;
          
          // Filter out Rick Astley videos
          const filtered = mediaData.filter(item => {
            // Look for Rick Astley in URLs or paths
            const isRickRoll = item.url && 
              (item.url.toLowerCase().includes('rick') || 
               item.url.toLowerCase().includes('astley') ||
               item.url.toLowerCase().includes('rickroll') || 
               item.url.toLowerCase().includes('never-gonna-give-you-up') ||
               item.url.toLowerCase().includes('dqw4w9wgxcq'));
            
            return !isRickRoll;
          });
          
          // Update storage if items were removed
          if (filtered.length < originalLength) {
            localStorage.setItem(key, JSON.stringify(filtered));
            removedCount += (originalLength - filtered.length);
            resultDiv.innerHTML += `<br>${key}: Removed ${originalLength - filtered.length} Rick Astley videos.`;
          } else {
            resultDiv.innerHTML += `<br>${key}: No Rick Astley videos found.`;
          }
        } catch (e) {
          resultDiv.innerHTML += `<br>${key}: Error processing data - ${e.message}`;
        }
      });
      
      if (removedCount > 0) {
        resultDiv.innerHTML = `Successfully removed ${removedCount} Rick Astley videos!<br>` + resultDiv.innerHTML;
      } else {
        resultDiv.innerHTML = 'No Rick Astley videos found in your space media.<br>' + resultDiv.innerHTML;
      }
    });
  </script>
</body>
</html>
